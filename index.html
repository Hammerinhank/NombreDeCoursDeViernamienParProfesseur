<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Statistiques Cours Vietnamien</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f8f9fa; }
        .section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #007bff; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background: #f2f2f2; }
        .diff { color: green; font-weight: bold; }
        .name-col { text-align: left; font-weight: bold; background: #eee; }
    </style>
</head>
<body>

    <div class="section">  
        <!-- /////////////////////////////////////////////// -->
        <h2>Derniers 30 Jours (V1.9)  </h2>
        <!-- /////////////////////////////////////////////// -->
        <div style="overflow-x: auto;">
            <table id="table30Jours"><thead><tr id="head30"></tr></thead><tbody id="body30"></tbody></table>
        </div>
    </div>

    <div class="section">
        <h2>Progression Mensuelle (Cours donnés dans le mois)</h2>
        <table id="tableMensuelle"><thead><tr id="headMonth"></tr></thead><tbody id="bodyMonth"></tbody></table>
    </div>

<script>
    const tutors = ["QUYNH", "CHI", "MAI", "HUONG", "THU", "XUAN", "LINH", "TRAN", "TRANG", "YEN" , "THUY"];

    fetch('history.json')
        .then(res => res.json())
        .then(history => {
            render30Days(history);
            renderMonthly(history);
        });

function render30Days(history) {
    const last30 = history.slice(-30);
    const head = document.getElementById('head30');
    const body = document.getElementById('body30');
    
    // Génération de l'en-tête (Dates)
    // Génération de l'en-tête (Dates sur une ligne, Heures sur la ligne du dessous)
    // Génération de l'en-tête avec Date et les 3 Fuseaux Horaires
    head.innerHTML = '<th>Professeur</th>' + last30.map(d => {
        const dateFormatted = `${d.date.split('-')[2]}/${d.date.split('-')[1]}`;
        
        if (!d.last_updated) {
            return `<th>${dateFormatted}<br><small>--:--</small></th>`;
        }

        // Création d'un objet Date à partir de la chaîne UTC
        const dateObj = new Date(d.last_updated);

        // Options pour extraire l'heure dans différents fuseaux
        const optParis = { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Paris' };
        const optVietnam = { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Ho_Chi_Minh' };
        const optUTC = { hour: '2-digit', minute: '2-digit', timeZone: 'UTC' };

        const timeUTC = dateObj.toLocaleTimeString('fr-FR', optUTC);
        const timeParis = dateObj.toLocaleTimeString('fr-FR', optParis);
        const timeVN = dateObj.toLocaleTimeString('fr-FR', optVietnam);
        return `<th>
            ${dateFormatted}<br>
            <small style="font-weight: normal; color: white; opacity: 0.85; display: block; line-height: 1.2; margin-top: 4px; font-size: 0.75em;">
                ${timeUTC} UTC<br>
                ${timeParis} PAR<br>
                ${timeVN} VN
            </small>
        </th>`;
    }).join('');
    
    tutors.forEach(t => {
        let row = `<tr><td class="name-col">${t}</td>`;
        
        last30.forEach((d, index) => {
            const currentVal = d.counts[t];
            let bgColor = "transparent";
            let fontColor = "black";
            let displayValue = currentVal || '-';
            
            // Calcul de l'écart avec le jour précédent
            if (index > 0 && currentVal !== null) {
                const prevVal = last30[index - 1].counts[t];
                
                if (prevVal !== null && currentVal > prevVal) {
                    const diff = currentVal - prevVal;
                    
                    // 1. Calcul de la couleur (Heatmap)
                    const intensity = Math.min(diff / 10, 1); 
                    bgColor = `rgba(40, 167, 69, ${0.1 + (intensity * 0.8)})`;
                    if (intensity > 0.6) fontColor = "white"; 

                    // 2. Ajout de l'écart entre parenthèses
                    displayValue = `${currentVal} <small>(+${diff})</small>`;
                }
            }
            
            row += `<td style="background-color: ${bgColor}; color: ${fontColor}; transition: all 0.3s; white-space: nowrap;">
                        ${displayValue}
                    </td>`;
        });
        body.innerHTML += row + '</tr>';
    });
}

    function renderMonthly(history) {
        const months = {}; // Groupement par YYYY-MM
        history.forEach(d => {
            const m = d.date.substring(0, 7);
            if (!months[m]) months[m] = [];
            months[m].push(d);
        });

        const sortedMonths = Object.keys(months).sort().reverse().slice(0, 36);
        const head = document.getElementById('headMonth');
        const body = document.getElementById('bodyMonth');

        head.innerHTML = '<th>Professeur</th>' + sortedMonths.map(m => `<th>${m}</th>`).join('');

        tutors.forEach(t => {
            let row = `<tr><td class="name-col">${t}</td>`;
            sortedMonths.forEach(m => {

            const data = months[m];
                
                // Cherche la première et la dernière valeur existante pour ce prof dans le mois
                const first = data.find(d => d.counts[t] !== undefined)?.counts[t];
                const last = [...data].reverse().find(d => d.counts[t] !== undefined)?.counts[t];
                
                const diff = (first !== undefined && last !== undefined) ? (last - first) : 0;

                
                row += `<td class="diff">+${diff}</td>`;
            });
            body.innerHTML += row + '</tr>';
        });
    }
</script>
</body>
</html>
