name: Update Preply Counts

on:
  schedule:
    - cron: '0 8 * * *' # Exécution automatique tous les jours à 8h (UTC)
  workflow_dispatch:      # Permet de lancer le script manuellement

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Autorise le bot à écrire les modifications dans votre dépôt
    permissions:
      contents: write
      
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run script
        run: python update_counts.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git commit -m "Mise à jour de l'historique" || exit 0
          git push
