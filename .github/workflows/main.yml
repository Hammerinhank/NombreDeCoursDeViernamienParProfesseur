name: Update Preply Counts

on:
  schedule:
    - cron: '0 8 * * *' # Tous les jours à 8h
  workflow_dispatch:      # Permet de lancer manuellement

jobs:
  build:
    runs-on: ubuntu-latest
    # AJOUT CRITIQUE : Donne l'autorisation d'écrire dans le dépôt
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Mise à jour vers v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Mise à jour vers v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run script
        run: python update_counts.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Mise à jour automatique des cours" || exit 0
          git push
